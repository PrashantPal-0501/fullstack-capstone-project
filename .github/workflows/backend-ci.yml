name: GiftLink Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGO_URL: mongodb://localhost:27017
      MONGO_DB: giftlink_test
      JWT_SECRET: ci_test_secret_key
      PORT: 3060
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./giftlink-backend
        run: npm install

      - name: Run tests
        working-directory: ./giftlink-backend
        run: npm test